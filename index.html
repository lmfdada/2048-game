<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="renderer" content="webkit" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <title>AI 游戏合集 - 2048, Snake, Tetris</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="game-container">
      <div class="game-selector">
        <select id="game-select" class="game-select">
          <option value="2048" selected>2048</option>
          <option value="snake">贪吃蛇 (Snake)</option>
          <option value="tetris">俄罗斯方块 (Tetris)</option>
        </select>
        <select id="difficulty-select" class="game-select difficulty-select">
          <option value="easy">简单 (Easy)</option>
          <option value="medium" selected>普通 (Medium)</option>
          <option value="hard">困难 (Hard)</option>
        </select>
      </div>

      <header class="header">
        <h1 class="title" id="game-title">2048</h1>
        <div class="scores">
          <div class="score-container">
            <div class="score-label">SCORE</div>
            <div class="score-value" id="score">0</div>
          </div>
          <div class="score-container">
            <div class="score-label">BEST</div>
            <div class="score-value" id="best-score">0</div>
          </div>
        </div>
      </header>

      <div class="controls">
        <p class="subtitle" id="game-subtitle">Join the numbers and get to the <strong>2048 tile!</strong></p>
        <button class="restart-btn" id="restart-btn">New Game</button>
      </div>

      <div class="game-view" id="game-2048">
        <div class="game-board-container">
          <div class="game-board" id="game-board">
            <!-- Background Grid Cells -->
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
          </div>
          <div class="tile-container" id="tile-container">
            <!-- Tiles will be dynamically injected here -->
          </div>

          <div class="game-message" id="game-message">
            <p id="game-message-text">Game Over!</p>
            <div class="lower">
              <button class="retry-btn" id="retry-btn">Try again</button>
            </div>
          </div>
        </div>
      </div>

      <div class="game-view hidden" id="game-snake">
        <div class="snake-board-container">
          <canvas id="snake-canvas"></canvas>
          <div class="game-message" id="snake-message">
            <p id="snake-message-text">Game Over!</p>
            <div class="lower">
              <button class="retry-btn" id="snake-retry-btn">Try again</button>
            </div>
          </div>
        </div>
      </div>

      <div class="game-view hidden" id="game-tetris">
        <div class="tetris-board-container">
          <canvas id="tetris-canvas"></canvas>
          <div class="game-message" id="tetris-message">
            <p id="tetris-message-text">Game Over!</p>
            <div class="lower">
              <button class="retry-btn" id="tetris-retry-btn">Try again</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Mobile Controls (D-pad) -->
      <div id="mobile-controls" class="mobile-controls hidden">
        <div class="control-row">
          <button class="control-btn up" id="ctrl-up"><span>↑</span></button>
        </div>
        <div class="control-row">
          <button class="control-btn left" id="ctrl-left"><span>←</span></button>
          <button class="control-btn down" id="ctrl-down"><span>↓</span></button>
          <button class="control-btn right" id="ctrl-right"><span>→</span></button>
        </div>
        <div class="control-row extra-row hidden" id="tetris-extra-controls">
          <button class="control-btn rotate" id="ctrl-rotate"><span>Rotate</span></button>
          <button class="control-btn drop" id="ctrl-drop"><span>Drop</span></button>
        </div>
      </div>

      <footer class="game-instructions" id="game-instructions">
        <!-- Instructions will be dynamically injected here -->
      </footer>
    </div>
    
    <script type="module" src="./main.js"></script>
    <script>
      // 只有在 URL 中包含 debug=1 时才加载 vConsole，避免 4G 网络下阻塞
      if (window.location.search.includes('debug=1')) {
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/vconsole@latest/dist/vconsole.min.js';
        script.onload = () => {
          window.vConsole = new window.VConsole();
        };
        document.body.appendChild(script);
      }
    </script>
  </body>
</html>
